<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎃 Cadastro | Hopi Hari</title>

  <link rel="stylesheet" href="cadastro.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Creepster&display=swap" rel="stylesheet">
</head>
<body>
  <!-- CABEÇALHO -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html">🎢 Hopi Hari</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="atracoes.html">Atrações</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="cadastro.html" class="active">Cadastro</a></li>
    </ul>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="container">
    <section class="cadastro-box">
      <h1 class="titulo">🔮 Crie sua conta</h1>
      <p class="sub">Junte-se ao Hopi Hari do Horror 😈</p>

      <form id="cadastroForm">
        <div class="input-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seuemail@hopihari.com.br" required>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="********" required>
        </div>

        <div class="input-group">
          <label for="confirmSenha">Confirmar senha</label>
          <input type="password" id="confirmSenha" placeholder="********" required>
        </div>

        <button type="submit" class="btn-cadastro">Cadastrar</button>
        <p class="msg"></p>
      </form>

      <p class="login-link">Já tem conta? <a href="login.html">Faça login</a></p>
    </section>
  </main>

  <!-- RODAPÉ -->
  <footer>
    <p>© 2025 Hopi Hari S.A — Edição Halloween 🎃</p>
  </footer>

  <script src="merged.js"></script>
</body>
</html>
