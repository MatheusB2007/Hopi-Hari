<body>

  <main class="login-container">
    <section class="login-box">
      <h1 class="titulo">🔮 Login do Medo</h1>
      <p class="sub">Entre... se tiver coragem 😈</p>

      <form id="loginForm">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seuemail@hopihari.com.br" required>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="********" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>

        <p class="msg"></p>
      </form>

      <p class="registro">Ainda não tem conta? <a href="Cadastro.html">Cadastre-se</a></p>
    </section>
